fail_fast: true
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff formatter
        entry: uv run ruff format docling_parse tests
        pass_filenames: false
        language: system
        files: '\.py$'
      - id: ruff-lint
        name: Ruff linter
        entry: uv run ruff check --fix docling_parse tests
        pass_filenames: false
        language: system
        files: '\.py$'
  - repo: local
    hooks:
      - id: mypy
        name: MyPy
        entry: uv run mypy docling_parse tests
        pass_filenames: false
        language: system
        files: '\.py$'
#  - repo: local
#    hooks:
#      - id: pytest
#        name: Pytest
#        entry: uv run pytest tests/
#        pass_filenames: false
#        language: system
#        files: '\.py$'	
  - repo: local
    hooks:
      - id: uv-lock
        name: uv-lock
        entry: uv lock --check
        pass_filenames: false
        language: system
